<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>
<body>

<nav>
  <div class="logo"><img src="images/logo.png" alt="Opti-Reach Logo" height="50"></div>
  <div class="menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="case-studies.html">Case Studies</a>
    <a href="testimonials.html">Testimonials</a>

  </div>
</nav>

<section id="contact-hero">
  <h1>Contact Opti-Reach</h1>
  <p>Request a Free SEO Audit or ask about our services.</p>
</section>

<section id="contact-form">
  <form action="mailto:opti.reachwebmaster@gmail.com" method="post" enctype="text/plain">
    <label for="name">Name</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="country">Country</label><br>
    <select id="country" name="country" required>
      <option value="Germany">Germany</option>
      <option value="France">France</option>
      <option value="Spain">Spain</option>
      <option value="Netherlands">Netherlands</option>
      <option value="Belgium">Belgium</option>
    </select><br><br>

    <label for="message">Message</label><br>
    <textarea id="message" name="message" rows="6" required></textarea><br><br>

    <input type="submit" value="Send" class="button">
  </form>
</section>

<footer>
  &copy; 2026 Opti-Reach | <a href="contact.html">Contact Us</a>
</footer>

</body>
</html>
